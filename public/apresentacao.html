<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Apresentação</title>
  <style>
    :root{
      --bg:#0b0f14;
      --card:#11161d;
      --green:#00ff9c;
      --green2:#00d27f;
      --gold:#f5c542;
      --white:#fff;
    }

    * { box-sizing:border-box; }

    html, body {
      margin:0;
      width:100%;
      height:100%;
      font-family:Inter, Arial, sans-serif;
      background:#000;
      color:#fff;
      overflow:hidden;
    }

    #app{
      width:100%;
      height:100vh;
      transition:opacity .35s ease;
      position:relative;
    }

    #overlay{
      position:fixed;
      top:20px;
      left:50%;
      transform:translateX(-50%);
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.12);
      padding:10px 20px;
      border-radius:999px;
      font-weight:800;
      backdrop-filter:blur(10px);
      z-index:20;
      max-width:min(92vw, 900px);
      text-align:center;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    #viewers{
      position:fixed;
      top:20px;
      left:20px;
      background:rgba(0,0,0,.45);
      padding:8px 12px;
      border-radius:999px;
      z-index:20;
      font-weight:600;
    }

    #countdown{
      position:fixed;
      top:20px;
      right:20px;
      background:rgba(0,0,0,.45);
      padding:8px 12px;
      border-radius:999px;
      z-index:20;
      font-weight:700;
      min-width:72px;
      text-align:center;
    }

    #buy{
      position:fixed;
      bottom:80px;
      left:50%;
      transform:translateX(-50%);
      background:linear-gradient(135deg,var(--green),var(--green2));
      color:#04110c;
      padding:15px 30px;
      border-radius:999px;
      display:none;
      animation:pulse 1.2s infinite;
      font-weight:900;
      z-index:20;
      text-decoration:none;
      box-shadow:0 15px 40px rgba(0,255,156,.22);
      max-width:min(92vw, 900px);
      text-align:center;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    @keyframes pulse{
      0%,100%{ transform:translateX(-50%) scale(1); }
      50%{ transform:translateX(-50%) scale(1.05); }
    }

    .center{
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      gap:14px;
      text-align:center;
      padding:24px;
    }

    .title{
      font-size:56px;
      font-weight:900;
      letter-spacing:-0.03em;
    }

    .sub{
      font-size:22px;
      opacity:.8;
      max-width:760px;
      line-height:1.4;
    }

    .bonus-list{
      margin-top:18px;
      display:grid;
      gap:10px;
      width:min(700px, 88vw);
    }

    .bonus-item{
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      padding:16px 18px;
      border-radius:16px;
      font-weight:700;
      font-size:22px;
    }

    .waiting{
      background:
        radial-gradient(circle at center, rgba(255,255,255,.08), transparent 40%),
        linear-gradient(160deg,#050607,#0c1117);
    }

    .pitch-frame{
      width:100%;
      height:100%;
      border:none;
      background:#000;
      display:block;
    }

    .slide-apresentacao {
      width:100vw;
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#000;
    }

    .slide-apresentacao img {
      max-width:100%;
      max-height:100%;
      object-fit:contain;
      display:block;
    }

    .pitch-fallback{
      background:
        radial-gradient(circle at top, rgba(0,255,156,.08), transparent 40%),
        linear-gradient(145deg,#0b0f14,#131922);
    }

    @media (max-width: 900px){
      .title { font-size:40px; }
      .sub { font-size:18px; }
      .bonus-item { font-size:18px; }
      #buy { bottom:28px; padding:14px 22px; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="overlay"></div>
  <div id="viewers"></div>
  <div id="countdown"></div>
  <a id="buy" target="_blank" rel="noopener noreferrer">🔥 GARANTIR VAGA</a>

  <script src="/app.js"></script>
  <script>
    let atual = '';
    let countdownValue = 0;
    let updateInterval = null;
    let countdownInterval = null;
    let renderToken = 0;
    let slideAtualNum = 0;
    let apresentacaoAtivaId = '';
    let slideUrlsCache = [];

    const $ = (id) => document.getElementById(id);

    function getSlideImageCandidates(slide) {
      const driveId = String(slide.driveId || '').trim();
      const rawUrl  = String(slide.url  || '').trim();
      const candidates = [];
      if (rawUrl)  candidates.push(rawUrl);
      if (driveId) {
        candidates.push(`https://drive.google.com/thumbnail?id=${driveId}&sz=w1600`);
        candidates.push(`https://drive.google.com/uc?id=${driveId}&export=download`);
        candidates.push(`https://drive.google.com/uc?export=view&id=${driveId}`);
      }
      return [...new Set(candidates)];
    }

    function loadImageWithFallback(img, candidates, onSuccess, onFail) {
      let index = 0;
      function tryNext() {
        if (index >= candidates.length) { onFail?.(); return; }
        const url = candidates[index++];
        img.onerror = tryNext;
        img.onload  = () => onSuccess?.(url);
        img.src     = url;
      }
      tryNext();
    }

    function fadeSlide(candidates, alt) {
      const token = ++renderToken;
      const app = $('app');
      app.style.opacity = 0;
      setTimeout(() => {
        if (token !== renderToken) return;
        app.innerHTML = `<div class="slide-apresentacao"><img id="slideImgCurrent" alt="${escapeAttr(alt)}"></div>`;
        app.style.opacity = 1;
        const img = document.getElementById('slideImgCurrent');
        if (img) {
          loadImageWithFallback(img, candidates, null, () => {
            console.warn('[apresentacao] Todos os candidatos falharam para:', alt);
          });
        }
      }, 220);
    }

    function fade(html) {
      const app = $('app');
      const token = ++renderToken;

      app.style.opacity = 0;

      setTimeout(() => {
        if (token !== renderToken) return;
        app.innerHTML = html;
        app.style.opacity = 1;
      }, 220);
    }

    function formatTime(totalSeconds) {
      const n = parseInt(totalSeconds || 0, 10);
      if (Number.isNaN(n) || n <= 0) return '';
      const min = Math.floor(n / 60);
      const sec = String(n % 60).padStart(2, '0');
      return `${min}:${sec}`;
    }

    function escapeAttr(str) {
      return String(str ?? '')
        .replace(/&/g, '&amp;')
        .replace(/"/g, '&quot;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function atualizarBotaoCompra(c) {
      const checkout = String(c.CHECKOUT || '').trim();
      const ctaText = String(c.CTA_TEXT || '🔥 GARANTIR VAGA').trim();

      $('buy').href = checkout || '#';
      $('buy').innerText = ctaText;
      $('buy').style.display = checkout ? 'block' : 'none';
    }

    function esconderBotaoCompra() {
      $('buy').style.display = 'none';
      $('buy').href = '#';
    }

    async function renderizarSlideAtual(c, forceReload) {
      const novoApresId = String(c.APRESENTACAO_ATIVA_ID || '').trim();
      const novoSlideNum = parseInt(c.SLIDE_ATUAL || '1', 10);

      const apresChanged = forceReload || novoApresId !== apresentacaoAtivaId;
      const slideChanged = novoSlideNum !== slideAtualNum;

      if (!apresChanged && !slideChanged) return;

      apresentacaoAtivaId = novoApresId;
      slideAtualNum = novoSlideNum;

      if (!novoApresId) {
        slideUrlsCache = [];
        const pdf = String(c.PDF_URL || '').trim();
        if (pdf) {
          fade(`<iframe class="pitch-frame" src="${escapeAttr(pdf)}"></iframe>`);
        } else {
          fade(`
            <div class="center pitch-fallback">
              <div class="title">INSCRIÇÕES ABERTAS</div>
              <div class="sub">Mentoria Foco em Canto</div>
            </div>
          `);
        }
        return;
      }

      try {
        if (apresChanged || !slideUrlsCache.length) {
          slideUrlsCache = [];
          const apresRes = await window.api.action({ action: 'getApresentacaoAtiva' });
          if (apresRes && apresRes.ok && apresRes.data) {
            const apres = apresRes.data;
            const midiasRes = await window.api.action({ action: 'listarMidias' });
            if (midiasRes && midiasRes.ok && midiasRes.data) {
              // Store full midia objects (including driveId) to enable fallback URLs
              const midiasById = new Map(midiasRes.data.map((m) => [m.id, m]));
              apres.slidesIds.forEach((slideId, idx) => {
                slideUrlsCache[idx] = midiasById.get(slideId) || null;
              });
            }
          }
        }

        const slideData = slideUrlsCache[novoSlideNum - 1];
        if (slideData) {
          const candidates = getSlideImageCandidates(slideData);
          if (candidates.length) {
            fadeSlide(candidates, `Slide ${novoSlideNum}`);
            return;
          }
        }
      } catch (e) {
        console.error('Erro ao renderizar slide:', e);
        slideUrlsCache = [];
      }

      const pdf = String(c.PDF_URL || '').trim();
      if (pdf) {
        fade(`<iframe class="pitch-frame" src="${escapeAttr(pdf)}"></iframe>`);
      } else {
        fade(`
          <div class="center pitch-fallback">
            <div class="title">INSCRIÇÕES ABERTAS</div>
            <div class="sub">Mentoria Foco em Canto</div>
          </div>
        `);
      }
    }

    function render(c){
      if (!c || typeof c !== 'object') return;

      $('overlay').innerText = c.OVERLAY || '';
      $('viewers').innerText = `${c.VIEWERS || 0} assistindo`;

      const novoTempo = parseInt(c.COUNTDOWN || 0, 10);
      if (!Number.isNaN(novoTempo)) {
        countdownValue = Math.max(0, novoTempo);
      }

      $('countdown').innerText = formatTime(countdownValue);

      const cena = String(c.CENA || 'pre').toLowerCase();

      if (cena !== atual) {
        if (cena === 'pre') {
          const videoUrl = String(c.VIDEO_URL || '').trim();
          if (videoUrl) {
            fade(`
              <video autoplay loop muted playsinline style="width:100%;height:100vh;object-fit:cover;display:block;background:#000;">
                <source src="${escapeAttr(videoUrl)}" type="video/mp4">
              </video>
            `);
          } else {
            fade(`
              <div class="center waiting">
                <div class="title">Aguardando...</div>
                <div class="sub">A transmissão vai começar em instantes. Fique por aqui.</div>
              </div>
            `);
          }
          esconderBotaoCompra();
        }

        else if (cena === 'live') {
          fade(`
            <div class="center waiting">
              <div class="title">AO VIVO</div>
              <div class="sub">Workshop Voz no Altar</div>
            </div>
          `);
          esconderBotaoCompra();
        }

        else if (cena === 'pitch') {
          renderizarSlideAtual(c, true);
          atualizarBotaoCompra(c);
        }

        else if (cena === 'bonus') {
          fade(`
            <div class="center pitch-fallback">
              <div class="title" style="color:var(--gold);">BÔNUS LIBERADOS</div>
              <div class="sub">Garanta sua entrada e aproveite a condição especial.</div>
              <div class="bonus-list">
                <div class="bonus-item">Acesso à Mentoria Foco em Canto</div>
                <div class="bonus-item">Grupo exclusivo</div>
                <div class="bonus-item">Oferta e condição especial</div>
              </div>
            </div>
          `);

          atualizarBotaoCompra(c);
        }

        else {
          fade(`
            <div class="center waiting">
              <div class="title">FOCO EM CANTO</div>
              <div class="sub">Transmissão em andamento.</div>
            </div>
          `);
          esconderBotaoCompra();
        }

        atual = cena;
      } else {
        if (cena === 'pitch') {
          renderizarSlideAtual(c, false);
          atualizarBotaoCompra(c);
        } else if (cena === 'bonus') {
          atualizarBotaoCompra(c);
        } else {
          esconderBotaoCompra();
        }
      }
    }

    async function update(){
      try {
        if (!window.api || typeof window.api.state !== 'function') {
          console.warn('API não disponível em /apresentacao');
          return;
        }

        const res = await window.api.state();

        if (res && res.ok && res.data) {
          render(res.data);
        }
      } catch (err) {
        console.error('Erro ao atualizar apresentação:', err);
      }
    }

    function iniciarCountdownLocal() {
      if (countdownInterval) clearInterval(countdownInterval);

      countdownInterval = setInterval(() => {
        if (countdownValue > 0) {
          countdownValue--;
          $('countdown').innerText = formatTime(countdownValue);
        } else {
          $('countdown').innerText = '';
        }
      }, 1000);
    }

    function iniciarAtualizacao() {
      if (updateInterval) clearInterval(updateInterval);
      updateInterval = setInterval(update, 2000);
      update();
    }

    document.addEventListener('DOMContentLoaded', () => {
      iniciarCountdownLocal();
      iniciarAtualizacao();
    });
  </script>
</body>
</html>
